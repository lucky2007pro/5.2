{% extends 'base.html' %}

{% block title %}Parolni almashtirish | Online Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        <div class="card card-soft p-4 p-md-5">
            <div class="mb-4">
                <p class="section-label mb-1">Xavfsizlik</p>
                <h1 class="h3 mb-0">Parolni almashtirish</h1>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}
                {% include 'includes/form_fields.html' %}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Yangilash</button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Orqaga</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
