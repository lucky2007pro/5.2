{% extends 'base.html' %}

{% block title %}Profilni tahrirlash | Online Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10 col-xl-8">
        <div class="card card-soft p-4 p-md-5">
            <div class="mb-4">
                <p class="section-label mb-1">Profil</p>
                <h1 class="h3 mb-0">Profil ma'lumotlarini tahrirlash</h1>
            </div>

            <form method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}
                {% include 'includes/form_fields.html' %}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">Saqlash</button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Bekor qilish</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
